<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Rooms</title>
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <header>
    <nav>
      <div class="brand">HMS</div>
      <div>
        <a href="/views/guest-dashboard.html">Dashboard</a>
        <a href="/views/billing.html">Billing</a>
        <button onclick="window.app.logout()">Logout</button>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <h1>Search Available Rooms</h1>
      <form id="searchForm">
        <label for="checkInDate">Check-in Date</label>
        <input type="date" id="checkInDate" name="checkInDate" required />

        <label for="checkOutDate">Check-out Date</label>
        <input type="date" id="checkOutDate" name="checkOutDate" required />

        <label for="roomTypeId">Room Type (optional)</label>
        <input type="number" id="roomTypeId" name="roomTypeId" placeholder="Room Type ID" />

        <button type="submit">Search</button>
      </form>

      <div id="results"></div>
    </div>

    <footer>
      <p>Use your booking ID to view billing and complete your stay.</p>
    </footer>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    const results = document.getElementById('results');
    const form = document.getElementById('searchForm');

    const renderRooms = (rooms) => {
      if (!rooms.length) {
        results.innerHTML = '<p>No available rooms found for the selected dates.</p>';
        return;
      }

      const rows = rooms
        .map((room) => {
          return `
            <tr>
              <td>${room.RoomID}</td>
              <td>${room.RoomNumber}</td>
              <td>${room.TypeName}</td>
              <td>${room.PricePerNight}</td>
              <td>${room.MaxOccupancy}</td>
            </tr>
          `;
        })
        .join('');

      results.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Number</th>
              <th>Type</th>
              <th>Price</th>
              <th>Max Occupancy</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const checkInDate = form.checkInDate.value;
      const checkOutDate = form.checkOutDate.value;
      const roomTypeId = form.roomTypeId.value;

      try {
        const params = new URLSearchParams({ checkInDate, checkOutDate });
        if (roomTypeId) params.append('roomTypeId', roomTypeId);

        const { data } = await window.app.apiRequest(`/api/rooms/search?${params.toString()}`);
        renderRooms(data);
      } catch (err) {
        window.app.handleError(err);
      }
    });
  </script>
</body>
</html>
