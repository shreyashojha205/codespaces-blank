<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMS Register</title>
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <header>
    <nav>
      <div class="brand">HMS</div>
      <div>
        <a href="/">Login</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <h1>Create Guest Account</h1>
      <p>Register now to manage your stays, bookings, and billing.</p>

      <form id="registerForm">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required />

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" />

        <label for="phone">Phone (optional)</label>
        <input type="text" id="phone" name="phone" />

        <label for="address">Address (optional)</label>
        <input type="text" id="address" name="address" />

        <button type="submit">Register</button>
      </form>

      <p>
        Already have an account? <a href="/">Login</a>
      </p>
    </div>

    <footer>
      <p>Secure guest registration powered by bcrypt & sessions.</p>
    </footer>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const body = {
        firstName: form.firstName.value.trim(),
        lastName: form.lastName.value.trim(),
        email: form.email.value.trim(),
        password: form.password.value,
        phone: form.phone.value.trim(),
        address: form.address.value.trim(),
      };

      try {
        await window.app.apiRequest('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify(body),
        });

        alert('Registration successful! You can now log in.');
        window.location.href = '/';
      } catch (err) {
        window.app.handleError(err);
      }
    });
  </script>
</body>
</html>
