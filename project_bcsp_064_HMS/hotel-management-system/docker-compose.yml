version: '3.8'

services:
  hms-db:
    image: mysql:8.0
    container_name: hms_docker_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotel_management_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  hms-redis:
    image: redis:alpine
    container_name: hms_docker_redis
    ports:
      - "6380:6379"
